            const totalCost = Object.values(parts).reduce((a, b) => a + (b?.price || 0), 0);
            let cpuScoreW = parts.cpu?.scoreWork || 0;
            let cpuScoreG = parts.cpu?.scoreGame || 0;
            let gpuScoreW = parts.gpu?.scoreWork || 0;
            let gpuScoreG = parts.gpu?.scoreGame || 0;
            let memScore = parts.memory?.scoreWork || 0; 
            const isNvme = parts.storage?.name.includes('NVMe');
            const isHdd = parts.storage?.name.includes('HDD');
            const storageBonus = isNvme ? 1.2 : (isHdd ? 0.7 : 1.0);
            
            const workPerformance = Math.min(100, Math.round((cpuScoreW * 0.6 + gpuScoreW * 0.2 + memScore * 0.2) * storageBonus));

        // --- Independent & Draggable Quiz Window ---
        const QuizWindow = ({ quiz, submissionResult, onSubmit, hasBooted, onViewSpecs, failedAttempts, currentCost }) => {
            const [minimized, setMinimized] = useState(false);
            const [position, setPosition] = useState({ x: window.innerWidth > 1000 ? 800 : Math.max(10, (window.innerWidth - 320) / 2), y: 20 });
            const [isDragging, setIsDragging] = useState(false);
            const dragOffset = useRef({ x: 0, y: 0 });

            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (isDragging) {
                        setPosition({
                            x: e.clientX - dragOffset.current.x,
                            y: e.clientY - dragOffset.current.y
                        });
                    }
                };

                const handleTouchMove = (e) => {
                    if (isDragging) {
                        const touch = e.touches[0];
                        setPosition({
                            x: touch.clientX - dragOffset.current.x,
                            y: touch.clientY - dragOffset.current.y
                        });
                    }
                };

                const handleEnd = () => {
                    setIsDragging(false);
                };

                if (isDragging) {
                    window.addEventListener('mousemove', handleMouseMove);
                    window.addEventListener('mouseup', handleEnd);
                    window.addEventListener('touchmove', handleTouchMove, { passive: false });
                    window.addEventListener('touchend', handleEnd);
                }

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseup', handleEnd);
                    window.removeEventListener('touchmove', handleTouchMove);
                    window.removeEventListener('touchend', handleEnd);
                };
            }, [isDragging]);

            const handleMouseDown = (e) => {
                setIsDragging(true);
                dragOffset.current = {
                    x: e.clientX - position.x,
                    y: e.clientY - position.y
                };
            };

            const handleTouchStart = (e) => {
                const touch = e.touches[0];
                setIsDragging(true);
                dragOffset.current = {
                    x: touch.clientX - position.x,
                    y: touch.clientY - position.y
                };
            };

            // Logic for Free Mode
            const isFreeMode = !quiz;
            const title = isFreeMode ? "自由制作モード" : quiz.title;
            const desc = isFreeMode ? "好きなパーツを組み合わせて、オリジナルのPCを作成しましょう。起動テスト合格後にレポートを出力できます。" : quiz.desc;
            const maxPrice = isFreeMode ? 0 : quiz.conditions.maxPrice;

            // Budget Bar logic (only for quiz)
            let priceRatio = 0;
            let barColor = 'bg-green-500';
            if (!isFreeMode) {
                priceRatio = Math.min(100, (currentCost / maxPrice) * 100);
                if (priceRatio > 80) barColor = 'bg-yellow-500';
                if (priceRatio > 100) barColor = 'bg-red-500';
            }
            
            // Extra Style for Extra Quizzes
            const isExtra = quiz?.isExtra;
            const headerColor = isExtra ? 'bg-red-900/60' : (isFreeMode ? 'bg-blue-900/40' : 'bg-yellow-700/20');
            const borderColor = isExtra ? 'border-red-600' : (isFreeMode ? 'border-blue-500' : 'border-yellow-600');
            const textColor = isExtra ? 'text-red-400' : (isFreeMode ? 'text-blue-400' : 'text-yellow-500');

            return (
                <div 
                    style={{ left: `${position.x}px`, top: `${position.y}px` }}
                    className={`absolute z-40 bg-slate-800 border-2 ${borderColor} rounded-xl shadow-[0_0_20px_rgba(0,0,0,0.5)] transition-shadow duration-300 ease-in-out ${
                        minimized ? 'w-64 h-12' : 'w-80'
                    } ${isDragging ? 'cursor-grabbing select-none' : ''}`}
                >
                    {/* Header */}
                    <div 
                        className={`h-12 ${headerColor} flex items-center justify-between px-4 cursor-grab active:cursor-grabbing hover:bg-opacity-50 transition rounded-t-xl touch-none`}
                        onMouseDown={handleMouseDown}
                        onTouchStart={handleTouchStart}
                    >
                        <div className={`flex items-center gap-2 font-bold ${textColor} pointer-events-none`}>

                        </div>
                        <button 
                            className={`${textColor} hover:text-white p-1`}

                            onTouchStart={(e) => e.stopPropagation()}
                            onClick={() => setMinimized(!minimized)}
                        >
                            {minimized ? <Icons.Plus /> : <Icons.Minus />}
                        </button>
                    </div>

                    {/* Content */}
                    {!minimized && (
                        <div className="p-4 bg-slate-800 rounded-b-xl">
                            <div className="text-sm text-slate-300 mb-4 leading-relaxed border-b border-slate-700 pb-2 cursor-default">
                                {desc}
                            </div>
                            
                            {!isFreeMode && (
                                <div className="space-y-3 mb-4 cursor-default">
                                    {/* Budget Bar */}
                                    <div>
                                        <div className="flex justify-between text-xs font-bold text-slate-400 mb-1">
                                            <span>予算消費状況</span>
                                            <span className={priceRatio > 100 ? "text-red-400" : "text-white"}>
                                                ¥{currentCost.toLocaleString()} / ¥{maxPrice.toLocaleString()}
                                            </span>
                                        </div>
                                        <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                                            <div style={{width: `${priceRatio}%`}} className={`h-full transition-all duration-500 ${barColor}`}></div>
                                        </div>
                                    </div>

                                    <div className="text-xs text-slate-400 grid grid-cols-1 gap-1">

                                            <span>必須OS:</span>

                                    </div>

                            {/* Result Area */}
                            {submissionResult && (
                                <div className={`mb-4 p-3 rounded border text-xs cursor-default ${
                                    submissionResult.success

                            {/* Hints for multiple failures */}
                            {!isFreeMode && !submissionResult?.success && failedAttempts >= 3 && (
                                <div className="mb-4 p-3 bg-blue-900/30 border border-blue-500/30 rounded text-xs text-blue-200 animate-slide-in">
                                    <div className="font-bold mb-1 flex items-center gap-1"><Icons.Help /> ヒント</div>
                                    <p>何度も失敗していますね。以下の点を確認しましょう：</p>
                                    <ul className="list-disc list-inside mt-1 text-blue-300">
                                        {currentCost > maxPrice && <li>予算オーバーです。CPUやGPUのランクを少し下げてみましょう。</li>}
                                        {quiz.conditions.requiresDedicatedGpu && <li>「CPU内蔵」ではない、独立したグラフィックボードを選んでいますか？</li>}
                                        {quiz.conditions.minGameScore && <li>ゲーム性能を上げるには、GPUとCPUのバランスが重要です。</li>}
                                        {quiz.conditions.minMemoryGb && <li>メモリの容量（GB）が条件を満たしているか確認しましょう。</li>}
                                    </ul>
                                </div>
                            )}

                            {/* Actions */}
                            {isFreeMode ? (
                                <div className="relative group">
                                    <button 
                                        onClick={onViewSpecs}
                                        disabled={!hasBooted}
                                        className={`w-full py-3 font-bold rounded shadow-lg transition-all flex justify-center items-center gap-2
                                            ${hasBooted 
                                                ? 'bg-blue-600 hover:bg-blue-500 text-white active:scale-95 animate-pulse' 
                                                : 'bg-slate-700 text-slate-500 cursor-not-allowed'
                                            }`}
                                    >
                                        <Icons.Print /> レポートを作成する
                                    </button>
                                     {!hasBooted && (
                                        <div className="absolute bottom-full left-0 w-full mb-2 p-2 bg-black text-white text-xs rounded opacity-0 group-hover:opacity-100 transition pointer-events-none text-center z-50">
                                            POWER ONして起動確認を行ってください
                                        </div>
                                    )}
                                </div>
                            ) : (
                                submissionResult?.success ? (
                                    <button 
                                        onClick={onViewSpecs}
                                        className="w-full py-3 bg-green-600 hover:bg-green-500 text-white font-bold rounded shadow-lg transition-all flex justify-center items-center gap-2 animate-pulse"
                                    >
                                        <Icons.Print /> スペック表を表示して終了
                                    </button>
                                ) : (
                                    <div className="relative group">
                                        <button 
                                            onClick={onSubmit}
                                            disabled={!hasBooted}
                                            className={`w-full py-3 font-bold rounded shadow-lg transition-all flex justify-center items-center gap-2
                                                ${hasBooted 
                                                    ? 'bg-yellow-600 hover:bg-yellow-500 text-white active:scale-95' 
                                                    : 'bg-slate-700 text-slate-500 cursor-not-allowed'
                                                }`}
                                        >
                                            課題を提出する
                                            {!hasBooted && <Icons.Alert />}
                                        </button>
                                        
                                        {!hasBooted && (
                                            <div className="absolute bottom-full left-0 w-full mb-2 p-2 bg-black text-white text-xs rounded opacity-0 group-hover:opacity-100 transition pointer-events-none text-center z-50">
                                                POWER ONして起動確認を行ってください
                                            </div>
                                        )}
                                    </div>
                                )
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- Spec Sheet Screen (Final Report) ---
        const SpecSheetScreen = ({ parts, quizTitle, onGoHome }) => {
            const specs = calculateSpecs(parts);
            const date = new Date().toLocaleDateString('ja-JP');
            const isFreeMode = quizTitle === '自由制作';

            // Calculate Cost Performance logic (replicated from BenchmarkScreen for report display)
            const performanceSum = specs.workPerformance + specs.gamePerformance;
            const costPerf = specs.totalCost > 0 
                ? Math.min(100, Math.round((performanceSum / (specs.totalCost / 5000)) * 10))
                : 0;
            
            // Calculate Storage Capacity Hint
            const getStorageCapacity = () => {
                if (!parts.storage) return null;
                const name = parts.storage.name;
                let capacityGB = 0;
                if (name.includes('500GB')) capacityGB = 500;
                if (name.includes('1TB')) capacityGB = 1000;
                if (name.includes('2TB')) capacityGB = 2000;
                if (name.includes('4TB')) capacityGB = 4000;

                if (capacityGB === 0) return null;

                // Assumptions: Photo 10MB, FHD Video 1.5GB/h (approx)
                const photos = Math.floor((capacityGB * 1000) / 10);
                const videos = Math.floor(capacityGB / 1.5);

                return { photos, videos };
            };
            const capacityHint = getStorageCapacity();

            return (
                <div className="absolute inset-0 z-50 bg-slate-900 flex items-center justify-center p-8 animate-fade-in overflow-y-auto">
                    <div className="bg-white text-slate-900 w-full max-w-3xl rounded shadow-2xl overflow-hidden print:w-full print:absolute print:top-0 print:left-0 print:m-0">
                        {/* Header */}
                        <div className="bg-slate-800 text-white p-6 border-b-4 border-yellow-500 flex justify-between items-center">
                            <div>
                                <h2 className="text-2xl font-bold">PC構成レポート</h2>
                                <div className="text-slate-400 text-sm mt-1">課題: {quizTitle}</div>
                            </div>
                            <div className="text-right">
                                <div className="text-3xl font-bold text-yellow-400">合格</div>
                                <div className="text-xs text-slate-400">{date}</div>
                            </div>
                        </div>

                        {/* Specs Table */}
                        <div className="p-8">
                            <p className="mb-4 text-sm text-black">※この画面の内容をワークシートに転記してください。</p>
                            
                            <table className="w-full border-collapse border border-slate-300 text-sm mb-6">
                                <thead>
                                    <tr className="bg-slate-200 text-black">
                                        <th className="border border-slate-400 p-2 text-left w-1/4">カテゴリ</th>
                                        <th className="border border-slate-400 p-2 text-left w-1/2">選択したパーツ</th>
                                        <th className="border border-slate-400 p-2 text-right w-1/4">価格</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {Object.entries(pcData.categories).map(([key, cat]) => {
                                        const part = parts[key] || parts[key === 'mb' ? 'motherboard' : '']; 
                                        const displayPart = parts[key === 'input' ? 'input' : key] || part;
                                        if(!displayPart) return null;

                                        return (
                                            <tr key={key}>
                                                <td className="border border-slate-300 p-2 font-bold text-slate-800">
                                                    {cat.label}
                                                </td>
                                                <td className="border border-slate-300 p-2 text-slate-900">
                                                    {displayPart.name}
                                                    {/* Storage Capacity Hint */}
                                                    {key === 'storage' && capacityHint && (
                                                        <div className="mt-1 text-xs text-slate-500 bg-slate-100 p-1 rounded inline-block">
                                                            デジタル化の目安: 写真(10MB)なら約{capacityHint.photos.toLocaleString()}枚、
                                                            FHD動画なら約{capacityHint.videos.toLocaleString()}時間分
                                                        </div>
                                                    )}
                                                </td>
                                                <td className="border border-slate-300 p-2 text-right text-slate-900">¥{displayPart.price.toLocaleString()}</td>
                                            </tr>
                                        );
                                    })}
                                    <tr className="bg-slate-100 font-bold text-slate-900">
                                        <td className="border border-slate-300 p-2 text-right" colSpan="2">合計金額</td>
                                        <td className="border border-slate-300 p-2 text-right text-lg text-blue-700">¥{specs.totalCost.toLocaleString()}</td>
                                    </tr>
                                </tbody>
                            </table>

                            {/* Performance Summary for Report */}
                            <div className="mb-6 border border-slate-300 rounded p-4 bg-slate-50">
                                <h3 className="font-bold text-slate-800 border-b border-slate-300 pb-2 mb-2">性能評価スコア</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="flex justify-between items-center">
                                        <span className="text-sm font-bold text-purple-700">ゲーム性能</span>
                                        <span className="text-lg font-mono font-bold text-slate-900">{specs.gamePerformance}/100</span>
                                    </div>
                                    <div className="flex justify-between items-center">
                                        <span className="text-sm font-bold text-blue-700">作業効率</span>
                                        <span className="text-lg font-mono font-bold text-slate-900">{specs.workPerformance}/100</span>
                                    </div>
                                </div>
                                {isFreeMode && (
                                    <div className="flex justify-between items-center mt-2 pt-2 border-t border-slate-300">
                                        <span className="text-sm font-bold text-green-700">コストパフォーマンス (自由制作限定評価)</span>
                                        <span className="text-lg font-mono font-bold text-slate-900">{costPerf}/100</span>
                                    </div>

                            <div className="mt-8 flex justify-center print:hidden">

                                >

        };

        const BootScreen = ({ osName, isHdd, onComplete }) => {
            useEffect(() => {
                const duration = isHdd ? 6000 : 3500;
                const timer = setTimeout(onComplete, duration);
                return () => clearTimeout(timer);
            }, [onComplete, isHdd]);

            const isUbuntu = osName && osName.includes('Ubuntu');

            return (
                <MonitorFrame>
                    <div className={`flex-1 flex flex-col items-center justify-center font-mono animate-boot-screen w-full h-full relative ${
                        isUbuntu ? 'bg-ubuntu-bg text-white' : 'bg-black text-white'
                    }`}>
                        {/* Windows Style */}
                        {!isUbuntu && (
                            <>
                                <div className="mb-12 scale-150 text-blue-500">
                                    <Icons.Motherboard /> {/* Placeholder for Win Logo */}
                                </div>
                                <div className="w-12 h-12 border-4 border-t-blue-500 border-slate-700 rounded-full animate-spin"></div>

                                <div className="space-y-2 text-sm w-full font-mono">

                        {/* BIOS Overlay (Common) - Fades out */}

                            <div className="absolute top-4 left-4 text-xs text-slate-500 text-left w-64 opacity-50">
                                <p>CPU Check... OK</p>

                        )}

        };

        const BenchmarkScreen = ({ parts, onBack, showLabels }) => {
            const [isTesting, setIsTesting] = useState(true);
            const [testProgress, setTestProgress] = useState(0);
            const [testPhase, setTestPhase] = useState("Initializing...");
            
            const specs = calculateSpecs(parts);
            const performanceSum = specs.workPerformance + specs.gamePerformance;
            const costPerf = Math.min(100, Math.round((performanceSum / (specs.totalCost / 5000)) * 10));

            useEffect(() => {
                const phases = [
                    { name: "CPU 演算テスト中...", duration: 800 },
                    { name: "GPU 描画テスト中...", duration: 1000 },
                    { name: "メモリ 転送速度テスト中...", duration: 600 },
                    { name: "ストレージ I/Oテスト中...", duration: 600 },
                    { name: "最終スコア算出中...", duration: 500 }
                ];

                let currentPhase = 0;
                let progress = 0;

                const interval = setInterval(() => {
                    progress += 2;
                    setTestProgress(Math.min(100, progress));

                    if (progress >= (currentPhase + 1) * (100 / phases.length)) {
                        if (currentPhase < phases.length - 1) {
                            currentPhase++;
                            setTestPhase(phases[currentPhase].name);
                        }
                    }

                    if (progress >= 100) {
                        clearInterval(interval);
                        setTimeout(() => setIsTesting(false), 500);
                    }
                }, 50);

                return () => clearInterval(interval);
            }, []);

            let rank = "C";
            if (specs.gamePerformance > 90 || specs.workPerformance > 90) rank = "S";
            else if (specs.gamePerformance > 70 || specs.workPerformance > 70) rank = "A";
            else if (specs.gamePerformance > 50 || specs.workPerformance > 50) rank = "B";

            if (isTesting) {
                return (
                    <MonitorFrame turnOff={onBack} showLabels={showLabels}>
                        <div className="flex-1 bg-slate-950 flex flex-col items-center justify-center p-8 font-mono">

                                <div className="flex justify-between mb-2 text-blue-400 text-sm">
                                    <span className="flex items-center gap-2"><Icons.App className="animate-spin-slow" /> {testPhase}</span>
                                    <span>{testProgress}%</span>
                                </div>
                                <div className="h-4 bg-slate-800 rounded-full overflow-hidden border border-slate-700 p-0.5 mb-8">
                                    <div 
                                        style={{width: `${testProgress}%`}} 
                                        className="h-full bg-gradient-to-r from-blue-600 to-cyan-400 rounded-full transition-all duration-100 ease-linear shadow-[0_0_15px_rgba(59,130,246,0.6)]"
                                    ></div>
                                </div>

                                <div className="grid grid-cols-2 gap-6">
                                    {/* Detailed Metrics */}
                                    <div className="space-y-4">
                                        <div className="bg-slate-900/80 p-4 rounded-xl border border-slate-800 shadow-inner">
                                            <div className="text-[10px] text-slate-500 mb-2 uppercase tracking-widest">Processor Load</div>
                                            <div className="flex items-end gap-1 h-12">
                                                {[...Array(12)].map((_, i) => (

                                                        className="flex-1 bg-blue-500/40 rounded-t-sm" 
                                                        style={{
                                                            height: `${Math.random() * 80 + 20}%`,
                                                            animation: `pulse 1.5s ease-in-out infinite ${i * 0.1}s`
                                                        }}
                                                    ></div>
                                                ))}
                                            </div>
                                            <div className="mt-2 flex justify-between text-[10px] text-blue-400/60">
                                                <span>Core 0-11</span>
                                                <span>{Math.round(testProgress * 0.9 + Math.random() * 10)}%</span>
                                            </div>
                                        </div>

                                        <div className="bg-slate-900/80 p-4 rounded-xl border border-slate-800 shadow-inner">
                                            <div className="text-[10px] text-slate-500 mb-2 uppercase tracking-widest">Memory Throughput</div>
                                            <div className="relative h-2 bg-slate-800 rounded-full overflow-hidden">
                                                <div 
                                                    className="absolute inset-0 bg-gradient-to-r from-transparent via-green-400/30 to-transparent w-1/2 animate-[shimmer_1s_infinite]"
                                                    style={{left: `${(testProgress * 2) % 100}%`}}
                                                ></div>
                                            </div>
                                            <div className="mt-2 text-[10px] text-green-400/60 text-right">
                                                {Math.round(testProgress * 128)} MB/s
                                            </div>
                                        </div>
                                    </div>

                                    {/* Real-time Console Output */}
                                    <div className="bg-black/50 p-4 rounded-xl border border-slate-800 font-mono text-[10px] text-slate-400 h-full overflow-hidden flex flex-col">
                                        <div className="text-blue-500 mb-2 flex items-center gap-1"><Icons.Alert className="w-3 h-3" /> TEST_LOG.TXT</div>
                                        <div className="space-y-1 overflow-hidden">
                                            <div className={testProgress > 10 ? "opacity-100" : "opacity-0"}>&gt; Initializing test suite...</div>
                                            <div className={testProgress > 25 ? "opacity-100" : "opacity-0"}>&gt; Running Integer Math tests... DONE</div>
                                            <div className={testProgress > 40 ? "opacity-100" : "opacity-0"}>&gt; Running Floating Point tests... DONE</div>
                                            <div className={testProgress > 60 ? "opacity-100" : "opacity-0"}>&gt; 3D Render: Texture Fill Rate... {Math.round(testProgress * 1.5)} GTex/s</div>
                                            <div className={testProgress > 80 ? "opacity-100" : "opacity-0"}>&gt; Disk I/O: Sequential Read... {Math.round(testProgress * 5)} MB/s</div>
                                            <div className={testProgress > 95 ? "opacity-100" : "opacity-0"}>&gt; Finalizing results...</div>
                                            <div className="animate-pulse">_</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </MonitorFrame>
                );
            }

            return (
                <MonitorFrame turnOff={onBack} showLabels={showLabels}>
                    <div className="flex-1 bg-slate-900 w-full h-full flex flex-col md:flex-row overflow-hidden animate-pop-in">
                        <div className="md:w-1/3 bg-gradient-to-br from-blue-900 to-slate-900 p-8 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-slate-700 relative overflow-hidden">
                            <div className="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-400 via-transparent to-transparent"></div>
                            <h2 className="text-slate-400 uppercase tracking-widest text-sm mb-2 font-bold z-10">総合評価ランク</h2>
                            <div className="text-9xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-blue-400 z-10 shadow-xl drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                                {rank}
                            </div>
                            <div className="mt-6 z-10 text-center">
                                <div className="text-xs text-slate-400">TOTAL COST</div>
                                <div className="text-2xl font-bold text-yellow-400">¥{specs.totalCost.toLocaleString()}</div>
                            </div>
                        </div>

                        <div className="flex-1 p-8 overflow-y-auto">
                            <h3 className="text-2xl font-bold mb-6 flex items-center gap-2">
                                <Icons.App /> ベンチマーク結果
                            </h3>
                            <div className="space-y-6">
                                <div>
                                    <div className="flex justify-between text-sm mb-1">
                                        <span className="font-bold text-purple-300">ゲーム性能</span>
                                        <span className="font-mono">{specs.gamePerformance}/100</span>
                                    </div>
                                    <div className="h-3 bg-slate-700 rounded-full overflow-hidden">
                                        <div style={{width: `${specs.gamePerformance}%`}} className="h-full bg-purple-500 transition-all duration-1000"></div>
                                    </div>
                                    <p className="text-xs text-slate-500 mt-1">
                                        {specs.gamePerformance > 80 ? "最新の3Dゲームも最高設定で快適です。" : 
                                         specs.gamePerformance > 50 ? "設定を調整すれば多くのゲームが遊べます。" : "3Dゲームは厳しいかもしれません。"}
                                    </p>
                                </div>
                                <div>
                                    <div className="flex justify-between text-sm mb-1">
                                        <span className="font-bold text-blue-300">作業効率 (Office/編集)</span>
                                        <span className="font-mono">{specs.workPerformance}/100</span>
                                    </div>
                                    <div className="h-3 bg-slate-700 rounded-full overflow-hidden">
                                        <div style={{width: `${specs.workPerformance}%`}} className="h-full bg-blue-500 transition-all duration-1000"></div>
                                    </div>
                                    {parts.storage?.name.includes('HDD') && <p className="text-xs text-red-400 mt-1">HDDが搭載されているため、起動やロードが遅くなります。</p>}
                                </div>
                                <div>
                                    <div className="flex justify-between text-sm mb-1">
                                        <span className="font-bold text-green-300">コストパフォーマンス</span>
                                        <span className="font-mono">{costPerf}/100</span>
                                    </div>
                                    <div className="h-3 bg-slate-700 rounded-full overflow-hidden">
                                        <div style={{width: `${costPerf}%`}} className="h-full bg-green-500 transition-all duration-1000"></div>
                                    </div>
                                </div>
                            </div>
                            <div className="mt-8 pt-6 border-t border-slate-700 flex justify-end">
                                <button onClick={onBack} className="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded text-white font-bold transition">
                                    構成画面に戻る（提出可能）
                                </button>
                            </div>
                        </div>
                    </div>
                </MonitorFrame>
            );
        };

        const PartCard = ({ part, onDragStart, onTouchStart, onDoubleClick, onHover, isSelected, detailed, categoryMaxPrice }) => {
            const cat = pcData.categories[part.type];
            if (!cat) return null; 

            // Price Tier Logic
            let priceStyle = "border-slate-700 bg-slate-800 hover:border-blue-500 hover:bg-slate-700"; // default
            let selectionBadge = <span className="text-[10px] font-bold bg-blue-500 text-white px-1.5 py-0.5 rounded">選択中</span>;
            
            if (isSelected) {
                const ratio = categoryMaxPrice > 0 ? part.price / categoryMaxPrice : 0;
                
                if (ratio >= 0.8) {
                    // High End
                    priceStyle = "border-pc-gold bg-pc-gold/10 shadow-[0_0_10px_rgba(214,158,46,0.2)]";
                    selectionBadge = <span className="text-[10px] font-bold bg-pc-gold text-slate-900 px-1.5 py-0.5 rounded">High End</span>;
                } else if (ratio <= 0.3 && part.price > 0) {
                    // Budget
                    priceStyle = "border-green-500 bg-green-500/10 shadow-[0_0_10px_rgba(34,197,94,0.2)]";
                    selectionBadge = <span className="text-[10px] font-bold bg-green-500 text-slate-900 px-1.5 py-0.5 rounded">Budget</span>;
                } else {
                    // Standard
                    priceStyle = "border-blue-400 bg-blue-900/20 shadow-[0_0_10px_rgba(59,130,246,0.2)]";
                }
            }
            
            return (
                <div 
                    draggable 
                    onDragStart={() => onDragStart(part)}
                    onTouchStart={(e) => onTouchStart(e, part)}
                    onDoubleClick={() => onDoubleClick(part)}
                    onMouseEnter={() => onHover(part)}
                    onMouseLeave={() => onHover(null)}
                    className={`group border p-3 rounded-lg cursor-pointer transition-all shadow-sm flex items-start gap-3 relative select-none ${priceStyle}`}
                >
                    <div className={`p-2 rounded bg-opacity-20 ${cat.color.replace('text-', 'bg-').replace('400', '500')} ${cat.color}`}>
                        {Icons[cat.icon] && React.createElement(Icons[cat.icon])}
                    </div>
                    <div className="flex-1 min-w-0 pointer-events-none">
                        <div className="font-bold text-sm text-slate-100 truncate">{part.name}</div>
                        <div className="text-xs text-slate-400">¥{part.price.toLocaleString()}</div>
                    </div>
                    
                    {isSelected && (
                        <div className="absolute right-2 top-2">
                            {selectionBadge}
                        </div>
                    )}
                </div>
            );
        };

        const DropZone = ({ type, part, onDrop, onRemove, isTarget, isValid, label, className, hasBooted, isActiveTab, showLabels }) => {
            const cat = pcData.categories[type];
            if (!cat) return null;

            let borderClass = "border-slate-600/50 border-dashed";
            let bgClass = "bg-slate-900/30";
            
            // RGB Logic
            const isRgb = hasBooted && part?.isRgb;
            const rgbStyle = isRgb ? 'animate-rgb border-transparent' : '';

            // Active Tab Guidance (Pulse empty slots)
            const activeGuidance = (!part && isActiveTab) ? 'animate-pulse-glow border-blue-500/50 bg-blue-500/10' : '';

            if (part) {
                borderClass = isValid ? "border-green-500/50 border-solid" : "border-red-500/50 border-solid";
                bgClass = "bg-slate-800 shadow-md";
            } else if (isTarget) {
                borderClass = "border-blue-400 border-dashed scale-[1.02]";
                bgClass = "bg-blue-900/20";
            }

            return (
                <div 
                    data-drop-type={type}
                    onDragOver={(e) => e.preventDefault()}
                    onDrop={() => onDrop(type)}
                    className={`relative w-full h-full rounded-lg border-2 ${borderClass} ${bgClass} ${rgbStyle} ${activeGuidance} transition-all duration-300 flex flex-col items-center justify-center p-2 group ${className || ''}`}
                >
                    {label && !part && (
                        <div className="absolute top-1 left-2 text-[10px] text-slate-500 uppercase tracking-wider pointer-events-none">{label}</div>
                    )}

                    {/* Educational Label Overlay - Centered at bottom with safe positioning */}
                    {showLabels && (
                        <div className="absolute bottom-1 left-1/2 -translate-x-1/2 z-30 pointer-events-none flex items-center justify-center rounded-lg whitespace-nowrap">
                            <span className="bg-yellow-500/90 text-slate-900 text-xs font-bold px-2 py-0.5 rounded shadow-lg border border-yellow-300 transform scale-90 md:scale-100">
                                {cat.academic}
                            </span>
                        </div>
                    )}
                    
                    {part ? (
                        <>
                            <div className={`p-2 rounded-full mb-1 ${cat.color.replace('text-', 'bg-').replace('400', '900')} bg-opacity-30`}>
                                {React.createElement(Icons[cat.icon])}
                            </div>
                            <div className="text-center w-full overflow-visible z-10 pb-4">
                                <div className="text-xs font-bold text-slate-200 px-1">{part.name}</div>
                                {isValid ? 
                                    <div className="text-[10px] text-green-400">配置OK</div> : 
                                    <div className="text-[10px] text-red-400">互換性エラー</div>
                                }
                                
                                {/* Volatility Visualization (A-3) */}
                                {type === 'memory' && (
                                    <div className="relative mt-1">
                                        <div className={`text-[9px] px-1 py-0.5 rounded border transition-colors ${
                                            hasBooted 
                                            ? 'bg-green-900/40 border-green-500/50 text-green-300 animate-pulse' 
                                            : 'bg-slate-700/50 border-slate-600 text-slate-400'
                                        }`}>
                                            {hasBooted ? "データ保持中 (通電)" : "データ消失 (揮発性)"}
                                        </div>
                                        {/* Disappearing data particles when power is off */}
                                        {!hasBooted && (
                                            <div className="absolute inset-0 pointer-events-none overflow-hidden">
                                                <div className="absolute top-0 left-1/4 text-[8px] text-green-400/40 animate-[data-fade_1s_ease-out_forwards]">1010</div>
                                                <div className="absolute top-0 left-1/2 text-[8px] text-green-400/40 animate-[data-fade_1.2s_ease-out_forwards]">0101</div>
                                                <div className="absolute top-0 left-3/4 text-[8px] text-green-400/40 animate-[data-fade_0.8s_ease-out_forwards]">1100</div>
                                            </div>
                                        )}
                                    </div>
                                )}
                                {type === 'storage' && (
                                    <div className={`mt-1 text-[9px] px-1 py-0.5 rounded border ${
                                        hasBooted 
                                        ? 'bg-blue-900/40 border-blue-500/50 text-blue-300' 
                                        : 'bg-slate-700/50 border-slate-600 text-slate-400'
                                    }`}>
                                        {hasBooted ? "アクセス中" : "データ保持 (非揮発性)"}
                                    </div>
                                )}
                            </div>
                            <button 
                                onClick={(e) => { e.stopPropagation(); onRemove(type); }}
                                className="absolute top-1 right-1 p-1 text-slate-500 hover:text-red-400 hover:bg-slate-700/50 rounded-full transition-colors opacity-0 group-hover:opacity-100 z-20"
                            >
                                <Icons.Trash />
                            </button>
                        </>
                    ) : (
                        <div className="text-center opacity-40 pointer-events-none flex flex-col items-center justify-center h-full pb-2">
                            <div className="mb-1 transform scale-90">{React.createElement(Icons[cat.icon])}</div>
                            <span className="text-[10px] font-mono leading-tight">{cat.label}</span>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('menu'); 
            const [confirmConfig, setConfirmConfig] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
            const [selectedParts, setSelectedParts] = useState({});
            const [draggedPart, setDraggedPart] = useState(null);
            const [activeTab, setActiveTab] = useState('cpu');
            const [quizMode, setQuizMode] = useState(null);
            const [submissionResult, setSubmissionResult] = useState(null);
            const [hoveredPart, setHoveredPart] = useState(null);
            const [hasBooted, setHasBooted] = useState(false);
            const [failedAttempts, setFailedAttempts] = useState(0);
            const [showEducationalLabels, setShowEducationalLabels] = useState(true); // Default ON
            const [clearedQuizzes, setClearedQuizzes] = useState([]); // Track cleared quiz IDs
            
            // Double Click Control States
            const [doubleClickAttempts, setDoubleClickAttempts] = useState(0);
            const [isDoubleClickEnabled, setIsDoubleClickEnabled] = useState(false);

            // Touch Drag State
            const [touchDragPart, setTouchDragPart] = useState(null);
            const [touchPos, setTouchPos] = useState({ x: 0, y: 0 });

            // LocalStorage Auto-Save & Load
            useEffect(() => {
                const savedData = localStorage.getItem('pcSimData');
                if (savedData) {
                    try {
                        const parsed = JSON.parse(savedData);
                        if (parsed.selectedParts) setSelectedParts(parsed.selectedParts);
                        if (parsed.quizMode) {
                            setQuizMode(parsed.quizMode);
                            setView('build');
                        }
                        if (parsed.clearedQuizzes) setClearedQuizzes(parsed.clearedQuizzes);
                    } catch (e) {
                        console.error("Failed to load save data", e);
                    }
                }
            }, []);

            useEffect(() => {
                const dataToSave = {
                    selectedParts: view === 'build' || view === 'benchmark' ? selectedParts : {},
                    quizMode: view === 'build' || view === 'benchmark' ? quizMode : null,
                    clearedQuizzes
                };
                localStorage.setItem('pcSimData', JSON.stringify(dataToSave));
            }, [selectedParts, quizMode, view, clearedQuizzes]);

            // Reset double click attempts if inactive for 2 seconds
            useEffect(() => {
                if (doubleClickAttempts > 0) {
                    const timer = setTimeout(() => setDoubleClickAttempts(0), 2000);
                    return () => clearTimeout(timer);
                }
            }, [doubleClickAttempts]);

            // Touch Events Logic
            useEffect(() => {
                const handleTouchMove = (e) => {
                    if (touchDragPart) {
                        const touch = e.touches[0];
                        setTouchPos({ x: touch.clientX, y: touch.clientY });
                    }
                };
                
                const handleTouchEnd = (e) => {
                    if (touchDragPart) {
                        const touch = e.changedTouches[0];
                        const element = document.elementFromPoint(touch.clientX, touch.clientY);
                        if (element) {
                            const dropZone = element.closest('[data-drop-type]');
                            if (dropZone) {
                                const dropType = dropZone.getAttribute('data-drop-type');
                                if (dropType === touchDragPart.type) {
                                    handlePartSelect(touchDragPart);
                                }
                            }
                        }
                        setTouchDragPart(null);
                    }
                };

                if (touchDragPart) {
                    window.addEventListener('touchmove', handleTouchMove, { passive: false });
                    window.addEventListener('touchend', handleTouchEnd);
                }
                
                return () => {
                    window.removeEventListener('touchmove', handleTouchMove);
                    window.removeEventListener('touchend', handleTouchEnd);
                };
            }, [touchDragPart]);

            const handleTouchStart = (e, part) => {
                // e.preventDefault(); // Sometimes prevents scrolling too aggressively
                const touch = e.touches[0];
                setTouchDragPart(part);
                setTouchPos({ x: touch.clientX, y: touch.clientY });
            };


            const goHome = () => {
                setSelectedParts({});
                setSubmissionResult(null);
                setQuizMode(null);
                setHasBooted(false);
                setFailedAttempts(0);
                setView('menu');
            };

            const startMode = (quiz) => {
                setQuizMode(quiz);
                setSelectedParts({});
                setSubmissionResult(null);
                setHasBooted(false);
                setFailedAttempts(0);
                setView('build');
            };
            
            const handleResetProgress = () => {
                if (window.confirm("これまでのクイズのクリア状況をすべてリセットしますか？")) {
                    setClearedQuizzes([]);
                    localStorage.removeItem('pcSimData'); // Also clears autosave
                }
            };

            const handleViewSpecs = () => {
                setView('specSheet');
            };

            const handleClearAll = () => {
                setConfirmConfig({
                    isOpen: true,
                    title: "構成リセット",
                    message: "全てのパーツを取り外して、最初から作り直しますか？",
                    onConfirm: () => {
                        setSelectedParts({});
                        setHasBooted(false);
                        setSubmissionResult(null);
                        setConfirmConfig(prev => ({ ...prev, isOpen: false }));
                        setSystemLog([{
                            id: Date.now(),
                            type: 'info',
                            text: '構成をリセットしました。',
                            time: new Date().toLocaleTimeString()
                        }]);
                    }
                });
            };

            const confirmGoHome = () => {
                setConfirmConfig({
                    isOpen: true,
                    title: "メニューに戻る",
                    message: "作業を中断してメニューに戻りますか？（現在の構成は保存されます）",
                    onConfirm: () => {
                        setConfirmConfig(prev => ({ ...prev, isOpen: false }));
                        goHome();
                    }
                });
            };

            const validation = useMemo(() => {
                const p = selectedParts;
                const errs = [];
                const warnings = [];
                const checks = { cpu: true, memory: true, gpu: true, storage: true, motherboard: true, os: true, app: true, input: true, display: true };
                
                // Compatibility Checks
                // 1. Socket Check (CPU vs Motherboard)
                if (p.cpu && p.motherboard) {
                    if (p.cpu.socket !== p.motherboard.socket) {
                        errs.push(`【互換性エラー】ソケットが合いません。CPUは ${p.cpu.socket} ですが、マザーボードは ${p.motherboard.socket} です。物理的に装着できません。`);
                        checks.cpu = false;
                        checks.motherboard = false;
                    }
                }

                // 2. Memory Type Check (Memory vs Motherboard)
                if (p.memory && p.motherboard) {
                    if (p.memory.memoryType !== p.motherboard.memoryType) {
                        errs.push(`【互換性エラー】メモリの規格が違います。このマザーボードは ${p.motherboard.memoryType} 専用です。${p.memory.memoryType} はスロットの形状が異なるため挿せません。`);
                        checks.memory = false;
                    }
                }

                // Educational OS Check
                if (!p.os) {
                    errs.push("【重要】OS（基本ソフトウェア）が未搭載です。ハードウェアを制御し、アプリを動かすための土台が必要です。");
                }
                
                // Display Check
                if (!p.display) {
                    errs.push("【出力装置】モニターがありません。コンピュータの処理結果を人間に見せることができません。");
                }

                // Bottleneck Logic (A-1)
                if (p.cpu && p.gpu && p.gpu.name !== "CPU内蔵 (なし)") {
                    const cpuScore = p.cpu.scoreGame || 0;
                    const gpuScore = p.gpu.scoreGame || 0;
                    
                    // High-end GPU with Low-end CPU
                    if (gpuScore > 70 && cpuScore < 50) {
                        warnings.push("【ボトルネック】GPUの性能に対してCPUが低すぎます。CPUの処理が追いつかず、GPUの本来のパワー（描画性能）を十分に引き出せません。");
                    }
                    // High-end CPU with Low-end GPU (for Gaming)
                    if (quizMode?.conditions?.requiredAppType === 'game' && cpuScore > 80 && gpuScore < 40) {
                        warnings.push("【ボトルネック】ゲーム用途としてはGPUが弱すぎます。CPUが高速に計算しても、画面の描画が追いつかずカクつきの原因になります。");
                    }
                }

                const essentials = ['cpu', 'memory', 'storage', 'input', 'display'];
                const missing = essentials.filter(t => !p[t]);
                const canBoot = missing.length === 0 && errs.length === 0 && p.os;

                return { errors: errs, warnings, checks, canBoot };
            }, [selectedParts, quizMode]);

            const currentTotalCost = useMemo(() => Object.values(selectedParts).reduce((a, b) => a + (b?.price || 0), 0), [selectedParts]);
            
            // Calculate max price for the current active category to determine price tiers
            const categoryMaxPrice = useMemo(() => {
                const parts = pcData.parts.filter(p => p.type === activeTab);
                if (!parts.length) return 0;
                return Math.max(...parts.map(p => p.price));
            }, [activeTab]);

            const handlePartSelect = (part) => {
                setHasBooted(false);
                if (part.type === 'cpu') {
                    const compatibleMb = pcData.parts.find(p => p.id === part.defaultMb);
                    setSelectedParts(prev => ({
                        ...prev,
                        [part.type]: part,
                        motherboard: compatibleMb || prev.motherboard
                    }));
                } else {
                    setSelectedParts(prev => ({ ...prev, [part.type]: part }));
                }
                setDraggedPart(null);
                if (submissionResult) setSubmissionResult(null);
            };

            const handlePartDoubleClick = (part) => {
                if (isDoubleClickEnabled) {
                    handlePartSelect(part);
                    return;
                }

                setDoubleClickAttempts(prev => {
                    const newCount = prev + 1;
                    if (newCount >= 3) {
                         // Use setTimeout to ensure state update completes and confirm dialog doesn't block improperly
                         setTimeout(() => {
                             if (window.confirm("マウス操作の練習のため、原則はドラッグ＆ドロップを推奨しています。\nダブルクリックによる配置を有効にしますか？")) {
                                setIsDoubleClickEnabled(true);
                                handlePartSelect(part);
                                setDoubleClickAttempts(0);
                             } else {
                                setDoubleClickAttempts(0);
                             }
                         }, 10);
                         return 0; // Reset immediately to prevent multiple prompts
                    }
                    return newCount;
                });
            };

            const handleRemovePart = (type) => {
                setHasBooted(false);
                setSelectedParts(prev => ({ ...prev, [type]: null }));
            };

            const isPartSelected = (partId) => {
                return Object.values(selectedParts).some(p => p && p.id === partId);
            };

            const handleSubmitAssignment = () => {
                if (!quizMode) return;
                const p = selectedParts;
                const cond = quizMode.conditions;
                const errors = [];
                const specs = calculateSpecs(p);

                let totalCost = Object.values(p).reduce((a, b) => a + (b?.price || 0), 0);
                if (totalCost > cond.maxPrice) errors.push(`予算オーバー: ¥${totalCost.toLocaleString()} > ¥${cond.maxPrice.toLocaleString()}`);

                if (cond.requiresDedicatedGpu && (!p.gpu || p.gpu.name.includes("内蔵"))) errors.push("必須: 独立したGPUが必要です");
                if (cond.requiresGamingInput && (!p.input || !p.input.name.includes("ゲーミング"))) errors.push("必須: ゲーミング用デバイスが必要です");

                if (cond.requiredOs && p.os?.name !== cond.requiredOs) errors.push(`OS指定: ${cond.requiredOs}を選択してください`);
                if (cond.requiredAppType && (!p.app || p.app.typeTag !== cond.requiredAppType)) errors.push("用途に合ったアプリがインストールされていません");
                
                // Special check for RAM size
                if (cond.minMemoryGb) {
                    const memName = p.memory?.name || "";
                    const match = memName.match(/(\d+)GB/);
                    if (match) {
                        const size = parseInt(match[1]);
                        if (size < cond.minMemoryGb) errors.push(`必須: メモリ${cond.minMemoryGb}GB以上が必要です (現在: ${size}GB)`);
                    } else {
                         errors.push(`必須: メモリ${cond.minMemoryGb}GB以上が必要です`);
                    }
                }
                
                // Special check for Storage
                if (cond.requiredStorageCapacity) {
                    if (!p.storage || !p.storage.name.includes(cond.requiredStorageCapacity)) {
                         errors.push(`必須: ストレージ${cond.requiredStorageCapacity}が必要です`);
                    }
                }

                // Special check for Display
                if (cond.requiredDisplayType) {
                     if (!p.display || !p.display.name.includes(cond.requiredDisplayType)) {
                         errors.push(`必須モニター要件: ${cond.requiredDisplayType}を含むモニターが必要です`);
                     }
                }

                if (cond.minGameScore && specs.gamePerformance < cond.minGameScore) errors.push(`ゲーム性能不足 (現在: ${specs.gamePerformance} / 目標: ${cond.minGameScore})`);
                if (cond.minWorkScore && specs.workPerformance < cond.minWorkScore) errors.push(`作業性能不足 (現在: ${specs.workPerformance} / 目標: ${cond.minWorkScore})`);

                if (errors.length > 0) {
                    setFailedAttempts(prev => prev + 1);
                } else {
                    // Success Logic
                    if (!clearedQuizzes.includes(quizMode.id)) {
                        setClearedQuizzes(prev => [...prev, quizMode.id]);
                    }
                }

                setSubmissionResult({ success: errors.length === 0, message: "課題クリア！完璧な構成です。", errors });
            };

            const onBootComplete = () => {
                setHasBooted(true);
                setView('benchmark');
            };

            if (view === 'menu') return (
                <StartScreen 
                    onSelectMode={startMode} 
                    clearedQuizzes={clearedQuizzes} 
                    onResetProgress={handleResetProgress} 
                    showLabels={showEducationalLabels}
                    onToggleLabels={() => setShowEducationalLabels(!showEducationalLabels)}
                />
            );
            if (view === 'booting') return <BootScreen osName={selectedParts.os?.name} isHdd={selectedParts.storage?.name.includes('HDD')} onComplete={onBootComplete} />;
            if (view === 'benchmark') return <BenchmarkScreen parts={selectedParts} onBack={() => setView('build')} showLabels={showEducationalLabels} />;
            if (view === 'specSheet') return <SpecSheetScreen parts={selectedParts} quizTitle={quizMode?.title || '自由制作'} onGoHome={goHome} />;

            return (
                <div className="flex h-screen bg-slate-900 text-slate-200 font-sans relative overflow-hidden">
                    {/* Confirm Modal */}
                    <ConfirmModal 
                        isOpen={confirmConfig.isOpen}
                        title={confirmConfig.title}
                        message={confirmConfig.message}
                        onConfirm={confirmConfig.onConfirm}
                        onCancel={() => setConfirmConfig(prev => ({ ...prev, isOpen: false }))}
                    />

                    {/* Hover Overlay */}
                    {!draggedPart && !touchDragPart && <PartDetailOverlay part={hoveredPart} />}

                    {/* Touch Drag Ghost */}
                    {touchDragPart && (
                        <div 
                            className="fixed z-50 pointer-events-none p-3 bg-blue-600 text-white rounded shadow-2xl opacity-80 border-2 border-white transform -translate-x-1/2 -translate-y-1/2"
                            style={{ left: touchPos.x, top: touchPos.y }}
                        >
                            <div className="text-xs font-bold">{touchDragPart.name}</div>
                        </div>
                    )}

                    {/* Floating Quiz Window */}
                    <QuizWindow 
                        quiz={quizMode} 
                        submissionResult={submissionResult} 
                        onSubmit={handleSubmitAssignment}
                        hasBooted={hasBooted}
                        onViewSpecs={handleViewSpecs}
                        failedAttempts={failedAttempts}
                        currentCost={currentTotalCost}
                    />

                    {/* LEFT SIDEBAR */}
                    <div className="w-72 flex flex-col border-r border-slate-700 bg-slate-800 z-30 shadow-xl">
                        <div className="p-3 border-b border-slate-700 bg-slate-800 z-40">
                            <div className="flex justify-between items-center mb-3">
                                <h1 className="font-bold text-base flex items-center gap-2 text-white">
                                    <div className="bg-blue-600 p-1 rounded"><Icons.Motherboard className="w-4 h-4" /></div>
                                    PC Sim
                                </h1>
                                <div className="flex gap-2">
                                    <button 
                                        onClick={handleClearAll}
                                        title="構成をリセット"
                                        className="text-[10px] bg-red-900/30 hover:bg-red-600 text-red-200 hover:text-white px-2 py-1 rounded transition flex items-center gap-1 border border-red-800/30"
                                    >
                                        <Icons.Refresh className="w-3 h-3" /> Reset
                                    </button>
                                    <button 
                                        onClick={confirmGoHome}
                                        title="メニューに戻る"
                                        className="text-[10px] bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white px-2 py-1 rounded transition flex items-center gap-1 border border-slate-600"
                                    >
                                        <Icons.Home className="w-3 h-3" /> Home
                                    </button>
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-4 gap-1.5">
                                {Object.keys(pcData.categories).filter(key => key !== 'motherboard').map(key => (
                                    <button 
                                        key={key}
                                        onClick={() => setActiveTab(key)}
                                        className={`flex flex-col items-center justify-center p-1.5 rounded transition-all ${
                                            activeTab === key ? 'bg-blue-600 text-white shadow-lg scale-105' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'
                                        }`}
                                        title={pcData.categories[key].label}
                                    >
                                        <div className="scale-75 mb-0.5">{React.createElement(Icons[pcData.categories[key].icon])}</div>
                                        <span className="text-[8px] font-bold leading-none truncate w-full text-center">{pcData.categories[key].label.split(' ')[0]}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                        
                        {/* Category Description Header - Compact */}
                        <div className="bg-slate-700/50 p-3 border-b border-slate-700 flex items-start gap-2 shadow-sm">
                            <div className={`p-1.5 rounded-lg bg-opacity-20 mt-0.5 shrink-0 ${pcData.categories[activeTab].color.replace('text-', 'bg-').replace('400', '500')} ${pcData.categories[activeTab].color}`}>
                                {React.createElement(Icons[pcData.categories[activeTab].icon], { className: "w-4 h-4" })}
                            </div>
                            <div className="flex-1 min-w-0">
                                <div className="text-xs font-bold text-white mb-0.5">{pcData.categories[activeTab].label}</div>
                                <div className="text-[10px] text-slate-300 leading-tight font-medium">{pcData.categories[activeTab].desc}</div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-2 space-y-1.5 bg-slate-900/50 scrollbar-hide relative">
                            {pcData.parts.filter(p => p.type === activeTab).map(part => (
                                <PartCard 
                                    key={part.id} 
                                    part={part} 
                                    isSelected={isPartSelected(part.id)}
                                    onDragStart={setDraggedPart}
                                    onTouchStart={handleTouchStart}
                                    onDoubleClick={handlePartDoubleClick}
                                    onHover={setHoveredPart}
                                    categoryMaxPrice={categoryMaxPrice}
                                    detailed={false}
                                />
                            ))}
                        </div>
                    </div>

                    {/* MAIN AREA */}
                    <div className="flex-1 flex flex-col relative overflow-hidden bg-slate-950">
                        {/* Status Bar - Compact */}
                        <div className="h-12 border-b border-slate-800 bg-slate-900/90 backdrop-blur flex items-center justify-between px-6 z-20">
                            <div className="flex items-center gap-6">
                                <div>
                                    <div className="text-[9px] text-slate-500 uppercase font-bold leading-none mb-1">Total Cost</div>
                                    <div className="text-lg font-mono font-bold text-yellow-400 leading-none">
                                        ¥{currentTotalCost.toLocaleString()}
                                    </div>
                                </div>
                            </div>

                            <button 
                                onClick={() => setView('booting')}
                                disabled={!validation.canBoot}
                                className={`
                                    flex items-center gap-2 px-6 py-2 rounded-full font-bold transition-all shadow-lg text-sm
                                    ${validation.canBoot 
                                        ? 'bg-blue-600 hover:bg-blue-500 text-white shadow-blue-500/30 transform hover:-translate-y-0.5' 
                                        : 'bg-slate-800 text-slate-600 cursor-not-allowed border border-slate-700'
                                    }
                                `}
                            >
                                <Icons.Power className="w-4 h-4" />
                                {validation.canBoot ? "POWER ON" : "INCOMPLETE"}
                            </button>
                        </div>

                        {/* WORKSPACE */}
                        <div className="flex-1 overflow-y-auto p-4 flex justify-center items-start">
                            <div className="w-full max-w-7xl grid grid-cols-12 gap-4 min-h-[600px]">
                                {/* LEFT COLUMN (Main Hardware) */}
                                <div className="col-span-9 flex flex-col gap-3 h-full">
                                    {/* Top: Case Interior */}
                                    <div className="bg-slate-900 rounded-2xl border-2 border-slate-700 p-1.5 relative shadow-2xl flex flex-col h-[400px]">
                                        <div className="absolute top-0 left-8 -mt-2.5 bg-slate-700 text-slate-300 px-3 py-0.5 text-[10px] font-bold rounded shadow z-10 uppercase">Case Interior</div>
                                        
                                        {/* Visual Fan */}
                                        <div className="absolute top-6 right-6 w-16 h-16 text-slate-700 z-0 opacity-30">
                                            <div className={hasBooted ? 'animate-spin-slow' : ''}>
                                                <FanIcon />
                                            </div>
                                        </div>

                                        <div className="flex-1 bg-pc-pcb rounded-xl relative overflow-hidden border border-slate-600 m-1.5 p-4 z-10">
                                            <div className="absolute inset-0 opacity-10 pointer-events-none" style={{backgroundImage: `linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px)`, backgroundSize: '30px 30px'}}></div>
                                            <div className="grid grid-cols-2 grid-rows-3 gap-4 h-full relative z-10">
                                                <div className="flex flex-col">
                                                    <DropZone type="cpu" label="CPU SOCKET" part={selectedParts.cpu} onDrop={() => handlePartSelect(draggedPart)} onRemove={handleRemovePart} isTarget={draggedPart?.type === 'cpu' || touchDragPart?.type === 'cpu'} isValid={validation.checks.cpu} className="h-full" hasBooted={hasBooted} isActiveTab={activeTab === 'cpu'} showLabels={showEducationalLabels} />
                                                    {selectedParts.motherboard && (<div className="text-center text-[9px] text-green-400/50 mt-0.5 truncate">MB: {selectedParts.motherboard.name}</div>)}
                                                </div>
                                                <div className="flex flex-col">
                                                    <DropZone type="memory" label="RAM SLOTS" part={selectedParts.memory} onDrop={() => handlePartSelect(draggedPart)} onRemove={handleRemovePart} isTarget={draggedPart?.type === 'memory' || touchDragPart?.type === 'memory'} isValid={validation.checks.memory} className="h-full" hasBooted={hasBooted} isActiveTab={activeTab === 'memory'} showLabels={showEducationalLabels} />
                                                </div>
                                                <div className="col-span-2 row-span-1">
                                                     <DropZone type="gpu" label="GPU SLOT" part={selectedParts.gpu} onDrop={() => handlePartSelect(draggedPart)} onRemove={handleRemovePart} isTarget={draggedPart?.type === 'gpu' || touchDragPart?.type === 'gpu'} isValid={validation.checks.gpu} className="h-full border-blue-500/20" hasBooted={hasBooted} isActiveTab={activeTab === 'gpu'} showLabels={showEducationalLabels} />
                                                </div>
                                                <div className="col-span-2">
                                                    <DropZone type="storage" label="STORAGE BAY" part={selectedParts.storage} onDrop={() => handlePartSelect(draggedPart)} onRemove={handleRemovePart} isTarget={draggedPart?.type === 'storage' || touchDragPart?.type === 'storage'} isValid={validation.checks.storage} hasBooted={hasBooted} isActiveTab={activeTab === 'storage'} showLabels={showEducationalLabels} />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    {/* Bottom: Peripherals */}
                                    <div className="bg-slate-800 rounded-xl border border-slate-700 p-3 shadow-lg h-[180px] relative">
                                        <div className="absolute top-0 left-8 -mt-2.5 bg-slate-700 text-slate-300 px-3 py-0.5 text-[10px] font-bold rounded shadow z-10 uppercase">Peripherals</div>
                                        <div className="h-full pt-1 grid grid-cols-2 gap-3">
                                            <DropZone type="input" label="INPUT DEVICES" part={selectedParts.input} onDrop={() => handlePartSelect(draggedPart)} onRemove={handleRemovePart} isTarget={draggedPart?.type === 'input' || touchDragPart?.type === 'input'} isValid={true} hasBooted={hasBooted} isActiveTab={activeTab === 'input'} showLabels={showEducationalLabels} />
                                            <DropZone type="display" label="DISPLAY" part={selectedParts.display} onDrop={() => handlePartSelect(draggedPart)} onRemove={handleRemovePart} isTarget={draggedPart?.type === 'display' || touchDragPart?.type === 'display'} isValid={true} hasBooted={hasBooted} isActiveTab={activeTab === 'display'} showLabels={showEducationalLabels} />
                                        </div>
                                    </div>
                                </div>
                                
                                {/* RIGHT COLUMN (Software & Logs) */}
                                <div className="col-span-3 flex flex-col gap-3 h-full">
                                    {/* Software */}
                                    <div className="bg-slate-800 rounded-xl border border-slate-700 p-3 shadow-lg flex flex-col gap-2 min-h-[200px] relative">
                                        <div className="absolute top-0 left-4 -mt-2.5 bg-slate-700 text-slate-300 px-3 py-0.5 text-[10px] font-bold rounded shadow z-10 uppercase">Software</div>
                                        <div className="flex flex-col gap-2 flex-1 pt-1">
                                            <div className="min-h-[5.5rem] h-auto">
                                                <DropZone type="os" label="OS" part={selectedParts.os} onDrop={() => handlePartSelect(draggedPart)} onRemove={handleRemovePart} isTarget={draggedPart?.type === 'os' || touchDragPart?.type === 'os'} isValid={true} isActiveTab={activeTab === 'os'} showLabels={showEducationalLabels} />
                                            </div>
                                            <div className="min-h-[5.5rem] h-auto">
                                                <DropZone type="app" label="APP" part={selectedParts.app} onDrop={() => handlePartSelect(draggedPart)} onRemove={handleRemovePart} isTarget={draggedPart?.type === 'app' || touchDragPart?.type === 'app'} isValid={true} isActiveTab={activeTab === 'app'} showLabels={showEducationalLabels} />
                                            </div>
                                        </div>
                                    </div>

                                    {/* System Log */}
                                    <div className="bg-slate-800 rounded-xl border border-slate-700 p-3 flex-1 flex flex-col overflow-hidden relative min-h-[150px]">
                                        <h3 className="text-[10px] font-bold text-slate-400 uppercase mb-2 flex justify-between items-center"><span className="flex items-center gap-1.5"><Icons.Alert className="w-3 h-3" /> System Log</span></h3>
                                        <div className="flex-1 overflow-y-auto pr-1 font-mono text-[10px]">
                                            <div className="space-y-1">
                                                {validation.errors.map((e, i) => (
                                                    <div key={`err-${i}`} className="flex gap-1.5 text-red-300 bg-red-900/20 p-1.5 rounded items-start"><Icons.Alert className="w-3 h-3 shrink-0 mt-0.5" /> <span>{e}</span></div>
                                                ))}

                                                {validation.warnings.map((w, i) => (
                                                    <div key={`warn-${i}`} className="flex gap-1.5 text-yellow-200 bg-yellow-900/20 p-1.5 rounded items-start"><Icons.Alert className="text-yellow-400 w-3 h-3 shrink-0 mt-0.5" /> <span>{w}</span></div>
                                                ))}

                                                {validation.errors.length === 0 && validation.warnings.length === 0 && (
                                                    <div className="text-green-500 flex items-center gap-1.5 p-1.5 bg-green-900/10 rounded"><Icons.Check className="w-3 h-3" /> System check passed.</div>
                                                )}
                                                
                                                <div className="mt-2 text-slate-600 border-t border-slate-700 pt-1">
                                                    <div>&gt; BIOS Check... OK</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
